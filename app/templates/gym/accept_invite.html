{% extends "base.html" %}
{% block title %}Accept Invite | RenewalDesk{% endblock %}
{% block auth_content %}
<div class="auth-card">
    <h2>Create staff account</h2>
    <p class="text-secondary">Joining as {{ email }}</p>
    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
            <label class="form-label" for="full_name">Full name</label>
            <input class="form-control" id="full_name" name="full_name" required>
        </div>
        <div class="mb-3">
            <label class="form-label" for="password">Password</label>
            <input class="form-control" id="password" name="password" type="password" minlength="10" required>
        </div>
        <button class="btn btn-primary w-100" type="submit">Create account</button>
    </form>
</div>
{% endblock %}
